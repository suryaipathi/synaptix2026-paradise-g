<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Adaptive Assessment Platform</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI;
            background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .container {
            width: 750px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            color: #1565c0;
        }
        
        button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1b5e20;
        }
        
        .option {
            margin: 8px 0;
        }
        
        .timer {
            font-weight: bold;
            color: #0d47a1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Adaptive Online Assessment</h2>
        <div class="timer">Time Taken: <span id="time">0</span> seconds</div>
        <br>
        <div id="questionBox"></div>
        <div id="optionsBox"></div>
        <button onclick="nextQuestion()">Submit</button>
        <div id="result"></div>
    </div>

    <script>
        let startTime = Date.now();
        let timerInterval = setInterval(() => {
            document.getElementById("time").innerText =
                Math.floor((Date.now() - startTime) / 1000);
        }, 1000);

        let currentDifficulty = 2;
        let subjectIndex = 0;
        let questionCount = 0;

        const subjects = ["Mathematics", "Computer Science", "Aptitude"];

        let performance = {
            "Mathematics": {
                correct: 0,
                total: 0
            },
            "Computer Science": {
                correct: 0,
                total: 0
            },
            "Aptitude": {
                correct: 0,
                total: 0
            }
        };

        const questions = {

            Mathematics: {
                1: [{
                    q: "5 + 3?",
                    options: ["6", "7", "8", "9"],
                    answer: "8"
                }, {
                    q: "10 - 4?",
                    options: ["5", "6", "7", "8"],
                    answer: "6"
                }],
                2: [{
                    q: "3x + 2 = 11",
                    options: ["2", "3", "4", "5"],
                    answer: "3"
                }, {
                    q: "Square root of 144?",
                    options: ["10", "11", "12", "13"],
                    answer: "12"
                }],
                3: [{
                    q: "x² - 25 = 0",
                    options: ["3", "4", "5", "6"],
                    answer: "5"
                }]
            },

            "Computer Science": {
                1: [{
                    q: "Input device?",
                    options: ["Monitor", "Keyboard", "Printer", "Speaker"],
                    answer: "Keyboard"
                }, {
                    q: "Binary uses?",
                    options: ["0,1", "1,2", "0-9", "A-F"],
                    answer: "0,1"
                }],
                2: [{
                    q: "FIFO structure?",
                    options: ["Stack", "Queue", "Tree", "Graph"],
                    answer: "Queue"
                }, {
                    q: "HTML used for?",
                    options: ["Styling", "Structure", "Database", "Programming"],
                    answer: "Structure"
                }],
                3: [{
                    q: "Binary Search complexity?",
                    options: ["O(n)", "O(n²)", "O(log n)", "O(1)"],
                    answer: "O(log n)"
                }]
            },

            Aptitude: {
                1: [{
                    q: "25% of 200?",
                    options: ["40", "45", "50", "55"],
                    answer: "50"
                }, {
                    q: "Next after Monday + 2 days?",
                    options: ["Tuesday", "Wednesday", "Thursday", "Friday"],
                    answer: "Wednesday"
                }],
                2: [{
                    q: "2:4 = 3:x",
                    options: ["5", "6", "7", "8"],
                    answer: "6"
                }, {
                    q: "Synonym of Quick?",
                    options: ["Fast", "Slow", "Late", "Weak"],
                    answer: "Fast"
                }],
                3: [{
                    q: "Sequence: 2,6,12,20, ?",
                    options: ["28", "30", "32", "36"],
                    answer: "30"
                }]
            }

        };

        let currentQuestionList = [];
        let questionPointer = 0;

        function loadQuestion() {
            let subject = subjects[subjectIndex];

            if (questionPointer === 0) {
                currentQuestionList = questions[subject][currentDifficulty];
            }

            let qObj = currentQuestionList[questionPointer];

            document.getElementById("questionBox").innerHTML =
                "<b>Subject:</b> " + subject +
                "<br><b>Difficulty:</b> " +
                (currentDifficulty == 1 ? "Easy" : currentDifficulty == 2 ? "Medium" : "Hard") +
                "<br><br>" + qObj.q;

            let optionsHTML = "";
            qObj.options.forEach(opt => {
                optionsHTML += `
        <div class="option">
        <input type="radio" name="option" value="${opt}"> ${opt}
        </div>`;
            });

            document.getElementById("optionsBox").innerHTML = optionsHTML;
        }

        function nextQuestion() {
            let selected = document.querySelector('input[name="option"]:checked');
            if (!selected) {
                alert("Select an option");
                return;
            }

            let subject = subjects[subjectIndex];
            let qObj = currentQuestionList[questionPointer];

            performance[subject].total++;

            if (selected.value === qObj.answer) {
                performance[subject].correct++;
                currentDifficulty = Math.min(3, currentDifficulty + 1);
            } else {
                currentDifficulty = Math.max(1, currentDifficulty - 1);
            }

            questionPointer++;
            questionCount++;

            if (questionPointer >= currentQuestionList.length) {
                subjectIndex++;
                questionPointer = 0;
            }

            if (subjectIndex >= subjects.length) {
                showResult();
                return;
            }

            loadQuestion();
        }

        function showResult() {
            clearInterval(timerInterval);
            let totalTime = Math.floor((Date.now() - startTime) / 1000);

            document.getElementById("questionBox").innerHTML = "Assessment Completed!";
            document.getElementById("optionsBox").innerHTML = "";
            document.querySelector("button").style.display = "none";

            let report = "<h3>Performance Report</h3>";

            subjects.forEach(sub => {
                let correct = performance[sub].correct;
                let total = performance[sub].total;
                let percent = total ? (correct / total) * 100 : 0;

                let level = percent >= 70 ? "Advanced" :
                    percent >= 40 ? "Intermediate" : "Beginner";

                report += `<b>${sub}</b><br>
        Score: ${correct}/${total} <br>
        Mastery: ${level}<br><br>`;
            });

            report += "<b>Total Time Taken:</b> " + totalTime + " seconds";

            document.getElementById("result").innerHTML = report;
        }

        loadQuestion();
    </script>

</body>

</html>
