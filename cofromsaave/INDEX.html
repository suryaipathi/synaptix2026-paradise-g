<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>
        /* ================= BODY ================= */
        
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at center, #1c2b36 0%, #0f2027 60%, #0a141a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* ================= LAMP ================= */
        
        .lamp-wrapper {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
        
        .lamp-wire {
            width: 4px;
            height: 120px;
            background: #aaa;
            margin: auto;
        }
        
        .lamp-head {
            width: 140px;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 110px solid #2b2b2b;
            position: relative;
            margin: auto;
            transition: 0.3s;
        }
        
        .lamp-head:hover {
            border-bottom-color: #3a3a3a;
        }
        
        .lamp-bulb {
            width: 34px;
            height: 34px;
            background: #ffe066;
            border-radius: 50%;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 30px #ffeb99, 0 0 60px #ffeb99, 0 0 120px rgba(255, 235, 153, 0.7);
            animation: glow 2s infinite alternate;
        }
        /* Glow animation */
        
        @keyframes glow {
            from {
                box-shadow: 0 0 20px #ffeb99;
            }
            to {
                box-shadow: 0 0 60px #fff2b3;
            }
        }
        /* ================= LIGHT BEAM ================= */
        
        .light-beam {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 400px solid transparent;
            border-right: 400px solid transparent;
            border-top: 650px solid rgba(255, 255, 180, 0.12);
            filter: blur(8px);
            z-index: 1;
        }
        /* ================= LOGIN FORM ================= */
        
        .login-form {
            position: relative;
            z-index: 10;
            width: 350px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: white;
        }
        
        .login-form h2 {
            margin-bottom: 25px;
        }
        /* ================= INPUTS ================= */
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
            font-size: 14px;
        }
        
        input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px #ffef9a;
        }
        
        label {
            position: absolute;
            left: 12px;
            top: 12px;
            font-size: 14px;
            opacity: 0.7;
            transition: 0.3s;
            pointer-events: none;
        }
        
        input:focus+label,
        input:not(:placeholder-shown)+label {
            top: -10px;
            font-size: 12px;
            background: #0f2027;
            padding: 2px 6px;
            border-radius: 5px;
        }
        /* ================= BUTTON ================= */
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #ffef9a;
            color: black;
        }
        /* ================= EXTRA LINKS ================= */
        
        .extra-links {
            margin-top: 15px;
            font-size: 13px;
        }
        
        .extra-links button {
            background: none;
            border: none;
            color: #ffef9a;
            cursor: pointer;
            padding: 5px;
        }
        
        .extra-links button:hover {
            text-decoration: underline;
        }
        /* ================= ERROR MESSAGE ================= */
        
        #warn {
            display: none;
            color: #ff4d4d;
            font-size: 13px;
            margin-bottom: 10px;
        }
        /* ================= SHAKE EFFECT ================= */
        
        @keyframes shake {
            0% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-6px);
            }
            50% {
                transform: translateX(6px);
            }
            75% {
                transform: translateX(-4px);
            }
            100% {
                transform: translateX(0);
            }
        }
        
        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>

<body>

    <!-- Lamp -->
    <div class="lamp-wrapper">
        <div class="lamp-wire"></div>
        <div class="lamp-head">
            <div class="lamp-bulb"></div>
        </div>
    </div>

    <div class="light-beam"></div>

    <!-- Login Form -->
    <div class="login-form">
        <h2 id="title">🎓 Student Login</h2>

        <div class="input-group">
            <input type="text" id="studentId" placeholder="TEJA " required>
            <label>Student ID</label>
        </div>

        <div class="input-group" id="emailGroup" style="display:none;">
            <input type="email" placeholder=" ">
            <label>Email</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="TEJA1" required>
            <label>Password</label>
        </div>

        <div id="warn">❌ Incorrect Password!</div>

        <button id="mainBtn">Login</button>

        <div class="extra-links">
            <button id="forgotBtn">Forgot Password?</button><br>
            <button id="createBtn">Create New Account</button><br>
            <button id="backBtn" style="display:none;">⬅ Back to Login</button>
        </div>
    </div>

    <script>
        const correctId = "student123";
        const correctPass = "123456";

        const btn = document.getElementById("mainBtn");
        const forgotBtn = document.getElementById("forgotBtn");
        const createBtn = document.getElementById("createBtn");
        const backBtn = document.getElementById("backBtn");
        const emailGroup = document.getElementById("emailGroup");
        const warn = document.getElementById("warn");
        const form = document.querySelector(".login-form");
        const title = document.getElementById("title");

        btn.onclick = () => {
            const id = document.getElementById("studentId").value;
            const pass = document.getElementById("password").value;
            warn.style.display = "none";

            // LOGIN MODE
            if (title.textContent.includes("Login")) {

                if (id === correctId && pass === correctPass) {

                    // Save student ID
                    localStorage.setItem("studentId", id);

                    // Small success effect
                    btn.textContent = "✔ Success!";
                    btn.style.background = "#4CAF50";
                    btn.style.color = "white";

                    // Redirect after 1 second
                    setTimeout(() => {
                        window.location.href = "quiz.html";
                    }, 1000);

                } else {
                    warn.style.display = "block";
                    form.classList.add("shake");
                    setTimeout(() => form.classList.remove("shake"), 300);
                }

            }

            // RESET MODE
            else if (title.textContent.includes("Reset")) {
                alert("Reset link sent to email!");
            }

            // REGISTER MODE
            else {
                alert("Account Created Successfully!");
            }
        };

        forgotBtn.onclick = () => {
            title.textContent = "🔐 Reset Password";
            btn.textContent = "Send Reset Link";
            emailGroup.style.display = "block";
            forgotBtn.style.display = "none";
            createBtn.style.display = "none";
            backBtn.style.display = "inline-block";
            warn.style.display = "none";
        };

        createBtn.onclick = () => {
            title.textContent = "📝 Create Account";
            btn.textContent = "Register";
            emailGroup.style.display = "block";
            forgotBtn.style.display = "none";
            createBtn.style.display = "none";
            backBtn.style.display = "inline-block";
            warn.style.display = "none";
        };

        backBtn.onclick = () => {
            title.textContent = "🎓 Student Login";
            btn.textContent = "Login";
            btn.style.background = "";
            btn.style.color = "";
            emailGroup.style.display = "none";
            forgotBtn.style.display = "inline-block";
            createBtn.style.display = "inline-block";
            backBtn.style.display = "none";
            warn.style.display = "none";
        };
    </script>

</body>

</html>
